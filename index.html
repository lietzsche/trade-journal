<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antigravity Stop - 트레일링 스톱 자산 관리 & 거래 일지 플랫폼</title>
    
    <!-- PWA manifest and mobile app tags -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#080a15" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Premium Fonts: Pretendard, Outfit and Inter -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Pretendard', 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        letter-spacing: -0.025em;
      }
      .font-display {
        font-family: 'Outfit', 'Pretendard', sans-serif;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('서비스 워커가 등록되었습니다!', reg))
            .catch(err => console.error('서비스 워커 등록 실패:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
