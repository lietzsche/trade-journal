name = "trade-journal"
main = "src/server.ts"
compatibility_date = "2024-04-03"

[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "trade-journal-db"
database_id = "af07d21d-a248-4147-a487-4a65483e1139" # Placeholder ID for local/production setup
migrations_dir = "drizzle/migrations"

